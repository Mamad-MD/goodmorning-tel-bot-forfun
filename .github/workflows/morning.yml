name: Send Morning Message

on:
  schedule:
    - cron: "30 2 * * *"   # 7 صبح تهران = 2:30 UTC
  workflow_dispatch:        # اجرا دستی هم داشته باشیم

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          M_CHAT_ID: ${{ secrets.M_CHAT_ID }}
        run: |
          python special_morning/send_message.py
