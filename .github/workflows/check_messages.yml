name: Check and Reply Messages

on:
  schedule:
    # هر ۱ ساعت از ساعت 6:30 UTC تا 22:30 UTC
    - cron: '0 6-22 * * *'
  workflow_dispatch: # امکان اجرای دستی در صورت عجله داشتن

jobs:
  check-and-reply:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Sync Script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        M_CHAT_ID: ${{ secrets.M_CHAT_ID }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: |
        python message_check/check_and_reply.py
